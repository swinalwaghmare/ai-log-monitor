apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  type: NodePort
  selector:
    app: backend
  ports:
  - port: 8000
    nodePort: 30007
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: 554074174392.dkr.ecr.us-east-1.amazonaws.com/log-backend:latest # or ECR image
        imagePullPolicy: Always
        ports:
        - containerPort: 8000