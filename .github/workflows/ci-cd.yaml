name: CI-CD pipeline

on:
  push:
    branches: ["main"]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Ensure ECR repositories exist
        run: |
          aws ecr describe-repositories --repository-names log-backend || \
          aws ecr create-repository --repository-name log-backend

          aws ecr describe-repositories --repository-names log-worker || \
          aws ecr create-repository --repository-name log-worker
      
      - name: Login to ECR
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin 554074174392.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Backend Image
        run: |
          docker build -t log-backend -f backend/Dockerfile .
          docker tag log-backend:latest 554074174392.dkr.ecr.us-east-1.amazonaws.com/log-backend:latest

      - name: Push Backend
        run: docker push 554074174392.dkr.ecr.us-east-1.amazonaws.com/log-backend:latest

      - name: Build Worker Image
        run: |
          docker build -t log-worker -f worker/Dockerfile .
          docker tag log-worker:latest 554074174392.dkr.ecr.us-east-1.amazonaws.com/log-worker:latest

      - name: Push Worker
        run: docker push 554074174392.dkr.ecr.us-east-1.amazonaws.com/log-worker:latest

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.29.0'
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name dev-cluster

      - name: Deploy to EKS
        run: |
          kubectl apply -f k8s/